<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebGL 3D</title>
  
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <canvas id="canvas"></canvas>
  <div id="uiContainer">
    <div id="ui">
      <div id="cameraAngle"></div>
    </div>
  </div>

  <video id="tvVideo" src="/Textures/tv_video.mp4"
         muted loop autoplay playsinline crossorigin="anonymous"
         style="display:none"></video>

  <div id="audioPanel">
    <div class="panel-section">
      <div class="section-title radio-title">Radio</div>
      <div class="section-controls">
        <button id="radioOn">ON</button>
        <button id="radioOff" class="active">OFF</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="master-volume">
        <label>Master Volume: <span id="masterVolumeLabel">100%</span></label>
        <input id="masterVolume" type="range" min="0" max="100" value="100">
      </div>
    </div>
    <div class="panel-section">
      <div class="bar-row">
        <span class="bar-label">Music</span>
        <div class="bar-track"><div id="musicBar" class="bar-fill music-fill" style="width:0%"></div></div>
        <span id="musicValue" class="bar-value">0%</span>
      </div>
      <div class="bar-row">
        <span class="bar-label">Static</span>
        <div class="bar-track"><div id="staticBar" class="bar-fill static-fill" style="width:0%"></div></div>
        <span id="staticValue" class="bar-value">0%</span>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title tv-title">TV</div>
      <div class="section-controls">
        <button id="tvOn">ON</button>
        <button id="tvOff" class="active">OFF</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="bar-row">
        <span class="bar-label">Sound</span>
        <div class="bar-track"><div id="tvBar" class="bar-fill tv-fill" style="width:0%"></div></div>
        <span id="tvValue" class="bar-value">0%</span>
      </div>
    </div>
  </div>

  <script src="https://webgl2fundamentals.org/webgl/resources/webgl-utils.js"></script>
  <script src="https://webgl2fundamentals.org/webgl/resources/webgl-lessons-ui.js"></script>

  <script src="https://twgljs.org/dist/4.x/twgl-full.min.js"></script>
  <script src="lib/webpd.min.js"></script>
  <script src="main.js"></script>

</body>
</html>
